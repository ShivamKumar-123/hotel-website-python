<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Aurum Grand — luxury hotel in New York: bespoke suites, spa, dining, and anticipatory concierge service."
    />
    <meta
      name="keywords"
      content="luxury hotel, boutique hotel, New York hotel, suites, Aurum Grand, book hotel, spa hotel"
    />
    <meta name="author" content="Aurum Grand" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#070707" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Aurum Grand</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('aurum-theme')
          if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
